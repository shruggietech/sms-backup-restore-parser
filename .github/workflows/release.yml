# -------------------------------------------------------------------
# release.yml — Automated build and release for sms-backup-parser
# -------------------------------------------------------------------
#
# Triggers on annotated tag pushes matching v*. Runs tests, builds
# standalone binaries on Windows and Ubuntu, then publishes a GitHub
# Release with both binaries attached.
# -------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,validate]"

      - name: Run test suite
        run: pytest tests/

  build-windows:
    name: Build Windows Binary
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[validate]"
          pip install pyinstaller

      - name: Build executable
        run: python scripts/build.py

      - name: Verify binary
        run: dist\sms-backup-parser.exe version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/sms-backup-parser.exe

  build-ubuntu:
    name: Build Ubuntu Binary
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[validate]"
          pip install pyinstaller

      - name: Build executable
        run: python scripts/build.py

      - name: Verify binary
        run: |
          chmod +x dist/sms-backup-parser
          dist/sms-backup-parser version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-binary
          path: dist/sms-backup-parser

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-ubuntu]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: artifacts/windows

      - name: Download Ubuntu binary
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-binary
          path: artifacts/ubuntu

      - name: Rename binaries with version and platform tags
        run: |
          TAG="${GITHUB_REF_NAME}"
          mv artifacts/windows/sms-backup-parser.exe "artifacts/sms-backup-parser-${TAG}-windows-x64.exe"
          mv artifacts/ubuntu/sms-backup-parser "artifacts/sms-backup-parser-${TAG}-ubuntu-x64"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            See [CHANGELOG.md](https://github.com/shruggietech/sms-backup-restore-parser/blob/main/CHANGELOG.md) for full release notes.

            > **Note:** v0.1.2 was not released. Changes that would have been v0.1.2 are included in v0.1.3.
          files: |
            artifacts/sms-backup-parser-*
